# Secrets template — copy to group_vars/all.yml and fill in real values
# group_vars/all.yml is gitignored
#
# Cluster topology note (hosts.ini [servers] group):
#   The cluster uses embedded etcd. Server count MUST be odd (1, 3, or 5) for quorum.
#   The first entry in [servers] initializes the etcd cluster (--cluster-init).
#   Additional [servers] entries join the existing etcd quorum automatically.
#   Fault tolerance: 1 server = none, 3 servers = 1 node, 5 servers = 2 nodes.

# SSH credentials (used by all managed hosts)
ansible_ssh_pass: <SSH_PASSWORD>
ansible_become_pass: <SUDO_PASSWORD>

# Cloudflare Tunnel (used by edge-deploy.yml → cloudflared role)
cloudflare_tunnel_token: <CLOUDFLARE_TUNNEL_TOKEN>

# OPNsense REST API (used by network-deploy.yml)
opnsense_api_key: <OPNSENSE_API_KEY>
opnsense_api_secret: <OPNSENSE_API_SECRET>

# cert-manager / Let's Encrypt DNS-01 via Cloudflare (used by services-deploy.yml → cert-manager role)
# Token requires: Zone → DNS → Edit, Zone → Zone → Read for fleet1.cloud
cloudflare_api_token: <CLOUDFLARE_API_TOKEN_WITH_DNS_EDIT_PERMISSION>
acme_email: <YOUR_EMAIL_FOR_LETSENCRYPT_EXPIRY_NOTICES>

# Grafana + Prometheus (used by services-deploy.yml → kube-prometheus-stack role)
grafana_admin_password: <GRAFANA_ADMIN_PASSWORD>
grafana_hostname: grafana.fleet1.cloud
prometheus_hostname: prometheus.fleet1.cloud

# Loki log aggregation (used by services-deploy.yml → loki role)
loki_storage_size: "20Gi"
loki_retention_period: "168h"  # 7 days

# Gitea admin account (used by services-deploy.yml → gitea role)
gitea_admin_username: <GITEA_ADMIN_USERNAME>
gitea_admin_password: <GITEA_ADMIN_PASSWORD>
gitea_admin_email: <GITEA_ADMIN_EMAIL>

# ArgoCD admin password hash (used by services-deploy.yml → argocd role)
# Generate with: htpasswd -nbBC 10 "" <password> | tr -d ':\n' | sed 's/$2y/$2a/'
argocd_admin_password_bcrypt: <ARGOCD_ADMIN_PASSWORD_BCRYPT_HASH>

# Gitea PAT for ArgoCD repository access (used by services-deploy.yml → argocd-bootstrap role)
# Create a Gitea PAT with read:repository scope for the argocd user
gitea_argocd_token: <GITEA_ARGOCD_PAT_TOKEN>

# ArgoCD applications (used by services-deploy.yml → argocd-bootstrap role)
# Each entry registers a GitOps app synced from the vanlab repo in Gitea.
# home-automation-prereqs and home-automation-apps require seal-secrets.yml to
# have been run and committed before registering (see README — Sealed Secrets).
argocd_apps:
  - name: static-site
    repo: gitadmin/vanlab.git
    path: manifests/static-site
    namespace: static-site
    revision: main
  - name: redirects
    repo: gitadmin/vanlab.git
    path: manifests/redirects
    namespace: traefik
    revision: main
  - name: home-automation-prereqs
    repo: gitadmin/vanlab.git
    path: manifests/home-automation/prereqs
    namespace: home-automation
    revision: main
  - name: home-automation-apps
    repo: gitadmin/vanlab.git
    path: manifests/home-automation/apps
    namespace: argocd
    revision: main
  - name: frigate
    repo: gitadmin/vanlab.git
    path: manifests/frigate
    namespace: frigate
    revision: main
    recurse: true

# ── Home Automation Stack ─────────────────────────────────────────────────────
# Used by: services-deploy.yml → mosquitto, influxdb, home-assistant, node-red roles
#          playbooks/utilities/seal-secrets.yml (seals secrets for ArgoCD GitOps)
#
# Deployment order (first time):
#   1. Fill all values below
#   2. ansible-playbook services-deploy.yml (deploys controller + Helm charts)
#   3. Log in to InfluxDB, copy org ID from URL, set influxdb_org_id below
#   4. ansible-playbook utilities/seal-secrets.yml
#      git add manifests/home-automation/prereqs/sealed-secrets.yaml && git commit && git push gitea main
#   5. ansible-playbook services-deploy.yml --tags argocd-bootstrap
#
# To rotate a secret after initial setup:
#   Update value below → re-run seal-secrets.yml → commit → push → ArgoCD auto-syncs

# InfluxDB 2.x credentials
influxdb_admin_password: <INFLUXDB_ADMIN_PASSWORD>
# Generate a random 64-char token: openssl rand -hex 32
influxdb_admin_token: <INFLUXDB_ADMIN_TOKEN>
# Fill AFTER first InfluxDB login — copy hex UUID from the URL bar (/orgs/<hex-id>)
influxdb_org_id: <INFLUXDB_ORG_ID_HEX>

# Mosquitto MQTT broker — password file entry for the homeassistant user
# Generate via utility: ansible-playbook playbooks/utilities/gen-mosquitto-passwd.yml \
#   -e "mqtt_user=homeassistant mqtt_pass=<password>"
# Paste the full "username:hash" line as the value
mosquitto_password_entry: "<USERNAME:HASHED_PASSWORD>"

# Node-RED admin UI authentication (bcrypt hash of the admin password)
# Generate: node -e "require('bcryptjs').hash('yourpassword', 8, (e,h) => console.log(h))"
# Or:       htpasswd -nbBC 8 "" yourpassword | tr -d ':\n'
node_red_admin_password_bcrypt: "<BCRYPT_HASH>"

# ── NVR Host (Frigate + Hailo-8) ──────────────────────────────────────────────
# Used by: playbooks/nvr/nvr-provision.yml → nvr role
#
# Deployment order (first time):
#   1. Fill nvr_frigate_admin_password, nvr_cameras below
#   2. ansible-playbook -i hosts.ini playbooks/nvr/nvr-provision.yml \
#        --tags host-setup,hailo                          (Phase A)
#   3. Push branch → ArgoCD syncs manifests/frigate/ (cert-manager issues MQTT client cert)
#   4. Obtain Longhorn NFS endpoint:
#        kubectl get svc -n longhorn-system -l longhorn.io/pvc-name=frigate-clips
#      Set nvr_longhorn_nfs_ip and nvr_longhorn_nfs_path below
#   5. ansible-playbook -i hosts.ini playbooks/nvr/nvr-provision.yml \
#        --tags frigate-config,nfs-mount,frigate-service  (Phase B)
#
# See specs/041-nvr-frigate-hailo/quickstart.md for full runbook.

# Frigate web UI admin password
nvr_frigate_admin_password: <NVR_FRIGATE_ADMIN_PASSWORD>

# MQTT broker IP (internal, cluster VLAN — do not use public DNS)
nvr_mqtt_broker_ip: <NVR_MQTT_BROKER_IP>  # e.g. 10.1.20.x
# MQTT client cert/key/CA are read automatically from the cluster by the playbook
# (cert-manager issues frigate-mqtt-client in the frigate namespace via ArgoCD sync)

# Longhorn NFS endpoint — populated AFTER ArgoCD syncs manifests/frigate/ (Phase B)
# Get with: kubectl get svc -n longhorn-system -l longhorn.io/pvc-name=frigate-clips \
#             -o jsonpath='{.items[0].spec.clusterIP}'
nvr_longhorn_nfs_ip: ""
# Get with: kubectl get pv $(kubectl get pvc frigate-clips -n frigate \
#             -o jsonpath='{.spec.volumeName}') -o jsonpath='{.spec.nfs.path}'
nvr_longhorn_nfs_path: ""

# RTSP credentials — shared across all cameras (vault-encrypt nvr_camera_rtsp_pass)
# To encrypt: ansible-vault encrypt_string '<password>' --name 'nvr_camera_rtsp_pass'
nvr_camera_rtsp_user: <NVR_CAMERA_RTSP_USER>
nvr_camera_rtsp_pass: <NVR_CAMERA_RTSP_PASS>  # ansible-vault encrypted

# Camera list — zero or more entries; can be empty for initial provisioning
# Dual-stream: rtsp_main_url → record role (high-res), rtsp_sub_url → detect role (low-res)
# EmpireTech/Dahua path pattern: subtype=0 (main 2688x1520), subtype=1 (sub 640x480)
nvr_cameras: []
# Example (EmpireTech IPC-T54IR-AS / Dahua OEM):
# nvr_cameras:
#   - name: cam-01
#     rtsp_main_url: "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.11:554/cam/realmonitor?channel=1&subtype=0"
#     rtsp_sub_url:  "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.11:554/cam/realmonitor?channel=1&subtype=1"
#   - name: cam-02
#     rtsp_main_url: "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.12:554/cam/realmonitor?channel=1&subtype=0"
#     rtsp_sub_url:  "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.12:554/cam/realmonitor?channel=1&subtype=1"
#   - name: cam-03
#     rtsp_main_url: "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.13:554/cam/realmonitor?channel=1&subtype=0"
#     rtsp_sub_url:  "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.13:554/cam/realmonitor?channel=1&subtype=1"
#   - name: cam-04
#     rtsp_main_url: "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.14:554/cam/realmonitor?channel=1&subtype=0"
#     rtsp_sub_url:  "rtsp://{{ nvr_camera_rtsp_user }}:{{ nvr_camera_rtsp_pass }}@10.1.40.14:554/cam/realmonitor?channel=1&subtype=1"

# ── Internal PKI (roles/pki) ────────────────────────────────────────────────
# No secrets required — all PKI lifecycle managed by cert-manager in-cluster.
# Defaults are defined in roles/pki/defaults/main.yml and can be overridden here.
# pki_ca_namespace: cert-manager
# pki_cert_namespace: traefik
# pki_ca_name: fleet1-lan-ca
# pki_ca_secret_name: fleet1-lan-ca-secret
# pki_wildcard_name: fleet1-lan-wildcard-tls
# pki_wildcard_secret_name: fleet1-lan-wildcard-tls
