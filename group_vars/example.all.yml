# Secrets template — copy to group_vars/all.yml and fill in real values
# group_vars/all.yml is gitignored
#
# Cluster topology note (hosts.ini [servers] group):
#   The cluster uses embedded etcd. Server count MUST be odd (1, 3, or 5) for quorum.
#   The first entry in [servers] initializes the etcd cluster (--cluster-init).
#   Additional [servers] entries join the existing etcd quorum automatically.
#   Fault tolerance: 1 server = none, 3 servers = 1 node, 5 servers = 2 nodes.

# SSH credentials (used by all managed hosts)
ansible_ssh_pass: <SSH_PASSWORD>
ansible_become_pass: <SUDO_PASSWORD>

# Cloudflare Tunnel (used by edge-deploy.yml → cloudflared role)
cloudflare_tunnel_token: <CLOUDFLARE_TUNNEL_TOKEN>

# OPNsense REST API (used by network-deploy.yml)
opnsense_api_key: <OPNSENSE_API_KEY>
opnsense_api_secret: <OPNSENSE_API_SECRET>

# cert-manager / Let's Encrypt DNS-01 via Cloudflare (used by services-deploy.yml → cert-manager role)
# Token requires: Zone → DNS → Edit, Zone → Zone → Read for fleet1.cloud
cloudflare_api_token: <CLOUDFLARE_API_TOKEN_WITH_DNS_EDIT_PERMISSION>
acme_email: <YOUR_EMAIL_FOR_LETSENCRYPT_EXPIRY_NOTICES>

# Gitea admin account (used by services-deploy.yml → gitea role)
gitea_admin_username: <GITEA_ADMIN_USERNAME>
gitea_admin_password: <GITEA_ADMIN_PASSWORD>
gitea_admin_email: <GITEA_ADMIN_EMAIL>

# ArgoCD admin password hash (used by services-deploy.yml → argocd role)
# Generate with: htpasswd -nbBC 10 "" <password> | tr -d ':\n' | sed 's/$2y/$2a/'
argocd_admin_password_bcrypt: <ARGOCD_ADMIN_PASSWORD_BCRYPT_HASH>

# Gitea PAT for ArgoCD repository access (used by services-deploy.yml → argocd-bootstrap role)
# Create a Gitea PAT with read:repository scope for the argocd user
gitea_argocd_token: <GITEA_ARGOCD_PAT_TOKEN>

# ArgoCD applications (used by services-deploy.yml → argocd-bootstrap role)
# Each entry registers a GitOps app synced from the vanlab repo in Gitea
argocd_apps:
  - name: static-site
    repo: gitadmin/vanlab.git
    path: manifests/static-site
    namespace: static-site
    revision: main
  - name: redirects
    repo: gitadmin/vanlab.git
    path: manifests/redirects
    namespace: traefik
    revision: main
