# =============================================================================
# VANLAB INVENTORY
# =============================================================================

# --- K3s Cluster ---
# ansible_host = LAN IP; SSH proxied via edge bastion (see group_vars/cluster.yml)
[servers]
node1  ansible_host=10.1.20.11
node3  ansible_host=10.1.20.13
node5  ansible_host=10.1.20.15

[agents]
node2  ansible_host=10.1.20.12
node4  ansible_host=10.1.20.14
node6  ansible_host=10.1.20.16

[cluster:children]
servers
agents

# --- Edge (Debian 13 + NetworkManager — managed separately from netplan cluster)
[edge_hosts]
edge      ansible_host=10.1.10.10

# --- NVR ---
[nvr]
nvr-host  ansible_host=10.1.10.11  # Reached via edge bastion

# --- Network ---
[network]
opnsense  ansible_ssh_private_key_file=~/.ssh/id_rsa

# =============================================================================
# TOPOLOGY REFERENCE (not managed by Ansible)
# =============================================================================
# OPNsense router:   10.1.1.1   — managed via SSH (shutdown only); config managed via REST API (network-deploy.yml)
# GS308T switch:     10.1.1.10  — web UI only
# GS308EPP switch1:  10.1.1.11  — web UI only
# GS308EPP switch2:  10.1.1.12  — web UI only
# GS308EPP switch3:  10.1.1.13  — web UI only

[all:vars]
ansible_user=fleetadmin
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_become_pass=fleetadmin
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_python_interpreter=auto_silent
