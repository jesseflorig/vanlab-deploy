---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-apex
  namespace: traefik
spec:
  redirectRegex:
    regex: "^https?://[^.]+\\.fleet1\\.cloud(.*)"
    replacement: "https://fleet1.cloud${1}"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wildcard-subdomain-redirect
  namespace: traefik
spec:
  entryPoints:
    - websecure
  tls:
    secretName: fleet1-cloud-tls
  routes:
    - match: HostRegexp(`^[^.]+\.fleet1\.cloud$`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-apex
      services:
        - name: noop@internal
          kind: TraefikService
