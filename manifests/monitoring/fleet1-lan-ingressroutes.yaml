---
# Traefik IngressRoute: grafana.fleet1.lan with mTLS device certificate enforcement.
# TLS cert is provided by the fleet1-lan-wildcard-tls TLSStore (SNI-selected).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-fleet1-lan
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`grafana.fleet1.lan`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
---
# Traefik IngressRoute: prometheus.fleet1.lan with mTLS device certificate enforcement.
# Service name follows the kube-prometheus-stack Helm chart default naming convention.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-fleet1-lan
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`prometheus.fleet1.lan`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
