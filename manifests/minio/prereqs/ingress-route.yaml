---
# Traefik IngressRoute: minio.fleet1.lan — MinIO admin console only.
# The MinIO S3 API (port 9000) is NOT exposed via IngressRoute per FR-012.
# TLS cert is provided by the fleet1-lan-wildcard-tls TLSStore (SNI-selected).
# Requires the management laptop's device client cert to be installed.
# Chart release name is "minio" — console Service is named "minio-console".
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console
  namespace: minio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`minio.fleet1.lan`)
      kind: Rule
      services:
        - name: minio-console
          port: 9001
