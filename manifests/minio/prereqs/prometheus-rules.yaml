---
# PrometheusRule: MinIO PVC capacity alert.
# Discovered by Prometheus Operator via the `release: kube-prometheus-stack` label.
# Fires when the MinIO PVC exceeds 70% used capacity so there is time to expand
# online via Longhorn before the instance runs out of space (FR-010).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: minio-alerts
  namespace: minio
  labels:
    release: kube-prometheus-stack
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  groups:
    - name: minio.storage
      interval: 5m
      rules:
        - alert: MinioPVCUsageHigh
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="minio"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="minio"}
            ) > 0.70
          for: 15m
          labels:
            severity: warning
            namespace: minio
          annotations:
            summary: "MinIO PVC usage above 70%"
            description: >
              MinIO PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }}
              is {{ $value | humanizePercentage }} full.
              Expand the Longhorn PVC before it reaches capacity:
              edit manifests/minio/minio-values.yaml persistence.size and push.
