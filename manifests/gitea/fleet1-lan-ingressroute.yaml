---
# Traefik IngressRoute: gitea.fleet1.lan with mTLS device certificate enforcement.
# TLS cert is provided by the fleet1-lan-wildcard-tls TLSStore (SNI-selected).
# Requires the management laptop's device client cert to be installed.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea-fleet1-lan
  namespace: gitea
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`gitea.fleet1.lan`)
      kind: Rule
      services:
        - name: gitea-http
          port: 3000
