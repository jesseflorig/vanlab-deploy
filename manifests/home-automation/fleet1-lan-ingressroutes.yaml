---
# Traefik IngressRoute: hass.fleet1.lan with mTLS device certificate enforcement.
# TLS cert is provided by the fleet1-lan-wildcard-tls TLSStore (SNI-selected).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant-fleet1-lan
  namespace: home-automation
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`hass.fleet1.lan`)
      kind: Rule
      services:
        - name: home-assistant
          port: 8080
---
# Traefik IngressRoute: influxdb.fleet1.lan with mTLS device certificate enforcement.
# Supersedes manifests/home-automation/influxdb-fleet1-lan-ingress.yaml (deleted).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: influxdb-fleet1-lan
  namespace: home-automation
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`influxdb.fleet1.lan`)
      kind: Rule
      services:
        - name: influxdb-influxdb2
          port: 8086
---
# Traefik IngressRoute: node-red.fleet1.lan with mTLS device certificate enforcement.
# TLS cert is provided by the fleet1-lan-wildcard-tls TLSStore (SNI-selected).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: node-red-fleet1-lan
  namespace: home-automation
spec:
  entryPoints:
    - websecure
  tls:
    options:
      name: device-mtls
      namespace: traefik
  routes:
    - match: Host(`node-red.fleet1.lan`)
      kind: Rule
      services:
        - name: node-red
          port: 1880
