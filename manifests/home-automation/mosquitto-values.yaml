---
# Mosquitto Helm values — helmforgedev/mosquitto 1.0.7
# Managed by ArgoCD.
#
# Auth model:
#   - MQTTS on port 8883 (TLS terminated by Mosquitto, cert from home-automation-ca)
#   - RP2040 devices:        TLS + username/password
#   - HA / Node-RED internal: TLS + client certificate (cafile set; require_certificate false)
#   - Plain 1883/9001 listeners remain (chart default); not exposed externally

image:
  tag: "2.0.22"

persistence:
  enabled: true
  storageClass: longhorn
  size: 1Gi

podAnnotations:
  reloader.stakater.com/auto: "true"

broker:
  extraConfig: |
    # MQTTS listener — Mosquitto terminates TLS, password auth required
    listener 8883
    protocol mqtt
    certfile /certs/server/tls.crt
    keyfile  /certs/server/tls.key
    cafile   /certs/client-ca/ca.crt
    require_certificate false
    allow_anonymous false
    password_file /mosquitto/passwd/passwordfile

extraVolumes:
  - name: server-tls
    secret:
      secretName: mosquitto-tls
  - name: client-ca
    secret:
      secretName: mosquitto-client-ca
      items:
        - key: ca.crt
          path: ca.crt
  - name: passwd
    secret:
      secretName: mosquitto-passwords

extraVolumeMounts:
  - name: server-tls
    mountPath: /certs/server
    readOnly: true
  - name: client-ca
    mountPath: /certs/client-ca
    readOnly: true
  - name: passwd
    mountPath: /mosquitto/passwd
    readOnly: true
