---
# Home Assistant Helm values — pajikos/home-assistant 0.3.52
# Managed by ArgoCD; generated from roles/home-assistant/templates/values.yaml.j2

image:
  repository: ghcr.io/home-assistant/home-assistant
  tag: "latest"
  pullPolicy: Always

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi
  accessMode: ReadWriteOnce

additionalVolumes:
  - name: config-extra
    configMap:
      name: home-assistant-config-extra
  - name: mqtt-client-cert
    secret:
      secretName: home-assistant-mqtt-client
  - name: influxdb-creds
    secret:
      secretName: home-assistant-influxdb

additionalMounts:
  - name: config-extra
    mountPath: /config/packages
    readOnly: true
  - name: mqtt-client-cert
    mountPath: /certs/mqtt-client
    readOnly: true
  - name: influxdb-creds
    mountPath: /run/secrets/influxdb
    readOnly: true

# Init container writes InfluxDB credentials from mounted secret into secrets.yaml.
# Runs once at pod start; idempotent (grep guards against duplicate entries).
initContainers:
  - name: write-influxdb-secrets
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        grep -q influxdb_token /config/secrets.yaml 2>/dev/null && exit 0
        printf 'influxdb_token: %s\ninfluxdb_org_id: %s\n' \
          "$(cat /run/secrets/influxdb/influxdb_token)" \
          "$(cat /run/secrets/influxdb/influxdb_org_id)" \
          >> /config/secrets.yaml
    volumeMounts:
      - name: influxdb-creds
        mountPath: /run/secrets/influxdb
        readOnly: true
      - name: config
        mountPath: /config

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: hass.fleet1.cloud
      paths:
        - path: /
          pathType: Prefix

env:
  - name: TZ
    value: America/New_York
