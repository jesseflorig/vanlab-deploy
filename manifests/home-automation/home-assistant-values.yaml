---
# Home Assistant Helm values — pajikos/home-assistant 0.3.52
# Managed by ArgoCD; generated from roles/home-assistant/templates/values.yaml.j2

podAnnotations:
  configmap.reloader.stakater.com/reload: "home-assistant-config-extra"

image:
  repository: ghcr.io/home-assistant/home-assistant
  tag: "latest"
  pullPolicy: Always

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi
  accessMode: ReadWriteOnce

additionalVolumes:
  - name: config-extra
    configMap:
      name: home-assistant-config-extra
  - name: mqtt-client-cert
    secret:
      secretName: home-assistant-mqtt-client

additionalMounts:
  - name: config-extra
    mountPath: /config/packages
    readOnly: true
  - name: mqtt-client-cert
    mountPath: /certs/mqtt-client
    readOnly: true

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: hass.fleet1.cloud
      paths:
        - path: /
          pathType: Prefix

env:
  - name: TZ
    value: America/New_York
  # InfluxDB credentials injected as env vars; referenced via !env_var in packages/influxdb.yaml
  - name: INFLUXDB_TOKEN
    valueFrom:
      secretKeyRef:
        name: home-assistant-influxdb
        key: influxdb_token
  - name: INFLUXDB_ORG_ID
    valueFrom:
      secretKeyRef:
        name: home-assistant-influxdb
        key: influxdb_org_id
