---
# ArgoCD Application: Node-RED
# Multi-source: Helm chart from schwarzit + values from this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-red
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://schwarzit.github.io/node-red-chart/
      chart: node-red
      targetRevision: "0.40.1"
      helm:
        valueFiles:
          - $values/manifests/home-automation/node-red-values.yaml
    - repoURL: https://gitea.fleet1.cloud:30443/gitadmin/vanlab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: home-automation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
