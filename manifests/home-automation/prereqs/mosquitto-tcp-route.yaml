---
# TCP IngressRoute: routes mqtt.fleet1.lan:8883 → mosquitto:8883
# TLS passthrough — Mosquitto terminates TLS using the home-automation-ca cert.
# Traefik reads the SNI from the unencrypted ClientHello to match the rule.
# sync wave 7: after the mosquitto Service (wave 6) exists.
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mosquitto-mqtts
  namespace: home-automation
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  entryPoints:
    - mqtts
  routes:
    - match: HostSNI(`mqtt.fleet1.lan`)
      services:
        - name: mosquitto
          port: 8883
  tls:
    passthrough: true
