---
# Home Assistant extra config packages, mounted at /config/packages/.
# sync wave 4: applied alongside certificates.
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config-extra
  namespace: home-automation
  annotations:
    argocd.argoproj.io/sync-wave: "4"
data:
  http.yaml: |
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.42.0.0/16

  influxdb.yaml: |
    influxdb:
      api_version: 2
      host: influxdb-influxdb2.home-automation.svc.cluster.local
      port: 8086
      ssl: false
      token: !env_var INFLUXDB_TOKEN
      organization: !env_var INFLUXDB_ORG_ID
      bucket: homeassistant
