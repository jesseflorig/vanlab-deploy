---
# ClusterIP Service for the external NVR host.
# No selector — traffic is routed via the matching Endpoints resource below.
# Traefik routes frigate.fleet1.cloud → this Service → Endpoints → 10.1.10.11:5000.
apiVersion: v1
kind: Service
metadata:
  name: frigate
  namespace: frigate
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
