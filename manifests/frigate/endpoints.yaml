---
# Endpoints for the external NVR host at 10.1.10.11.
# Must match the name and namespace of the 'frigate' Service exactly.
# Update port if nvr_frigate_port is changed from the default (5000).
apiVersion: v1
kind: Endpoints
metadata:
  name: frigate
  namespace: frigate
subsets:
  - addresses:
      - ip: 10.1.10.11
    ports:
      - name: http
        port: 5000
        protocol: TCP
