---
# Keeps the frigate-clips Longhorn RWX PVC attached so the share-manager pod
# stays running at all times. Without this, Longhorn detaches the volume when
# no K8s consumer holds it, causing the NFS export to disappear and the NVR
# host to lose its /mnt/frigate-clips mount after reboot.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clips-keepalive
  namespace: frigate
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clips-keepalive
  template:
    metadata:
      labels:
        app: clips-keepalive
    spec:
      containers:
        - name: keepalive
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          volumeMounts:
            - name: clips
              mountPath: /mnt/frigate-clips
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
      volumes:
        - name: clips
          persistentVolumeClaim:
            claimName: frigate-clips
