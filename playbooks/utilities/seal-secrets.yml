---
# Seal application secrets with the cluster's Sealed Secrets controller.
#
# Prerequisites:
#   - Sealed Secrets controller running (ansible-playbook services-deploy.yml --tags sealed-secrets)
#   - group_vars/all.yml populated with real values (not placeholders)
#
# What this generates:
#   manifests/home-automation/prereqs/sealed-secrets.yaml  (tag: home-automation)
#   manifests/monitoring/prereqs/sealed-secrets.yaml       (tag: opnsense-exporter)
#
# After running, commit and push the generated file(s):
#   git add manifests/
#   git commit -m "feat: update sealed secrets"
#   git push
#
# Re-run any time a secret value changes in group_vars.
# SealedSecrets are cluster-specific — they cannot be decrypted outside this cluster.

- name: Generate Sealed Secrets for home-automation stack
  hosts: servers[0]
  become: true
  tags: home-automation
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    sealed_secrets_namespace: kube-system
    sealed_secrets_controller_name: sealed-secrets-controller
    work_dir: /tmp/seal-secrets-work

  tasks:
    - name: Ensure work directory exists
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        mode: "0700"
      changed_when: false

    - name: Fetch Sealed Secrets controller public certificate
      ansible.builtin.command: >
        kubeseal --fetch-cert
        --controller-namespace {{ sealed_secrets_namespace }}
        --controller-name {{ sealed_secrets_controller_name }}
      register: controller_cert
      changed_when: false

    - name: Write controller cert to file
      ansible.builtin.copy:
        content: "{{ controller_cert.stdout }}"
        dest: "{{ work_dir }}/sealed-secrets.crt"
        mode: "0644"
      changed_when: false

    # ── mosquitto-passwords ──────────────────────────────────────────────────

    - name: Create and seal mosquitto-passwords Secret
      ansible.builtin.shell: |
        kubectl create secret generic mosquitto-passwords \
          --namespace home-automation \
          --from-literal=passwordfile='{{ mosquitto_password_entry }}' \
          --dry-run=client -o yaml \
        | kubeseal --cert {{ work_dir }}/sealed-secrets.crt \
          --format yaml
      register: sealed_mosquitto_passwords
      changed_when: false
      no_log: true

    # ── influxdb-auth ────────────────────────────────────────────────────────

    - name: Create and seal influxdb-auth Secret
      ansible.builtin.shell: |
        kubectl create secret generic influxdb-auth \
          --namespace home-automation \
          --from-literal=admin-password='{{ influxdb_admin_password }}' \
          --from-literal=admin-token='{{ influxdb_admin_token }}' \
          --dry-run=client -o yaml \
        | kubeseal --cert {{ work_dir }}/sealed-secrets.crt \
          --format yaml
      register: sealed_influxdb_auth
      changed_when: false
      no_log: true

    # ── influxdb-secrets.yaml (HA secrets.yaml injection) ────────────────────

    - name: Create and seal home-assistant-influxdb Secret
      ansible.builtin.shell: |
        kubectl create secret generic home-assistant-influxdb \
          --namespace home-automation \
          --from-literal=influxdb_token='{{ influxdb_admin_token }}' \
          --from-literal=influxdb_org_id='{{ influxdb_org_id }}' \
          --dry-run=client -o yaml \
        | kubeseal --cert {{ work_dir }}/sealed-secrets.crt \
          --format yaml
      register: sealed_ha_influxdb
      changed_when: false
      no_log: true

    # ── node-red-admin ───────────────────────────────────────────────────────

    - name: Create and seal node-red-admin Secret
      ansible.builtin.shell: |
        kubectl create secret generic node-red-admin \
          --namespace home-automation \
          --from-literal=admin-password-hash='{{ node_red_admin_password_bcrypt }}' \
          --from-literal=credential-secret='{{ node_red_admin_password_bcrypt }}' \
          --dry-run=client -o yaml \
        | kubeseal --cert {{ work_dir }}/sealed-secrets.crt \
          --format yaml
      register: sealed_nodered_admin
      changed_when: false
      no_log: true

    # ── Inject sync-wave annotation and combine ──────────────────────────────
    # kubeseal output has metadata.annotations: null; we add the sync-wave
    # so ArgoCD applies secrets after certs and configmaps (waves 0-4).

    - name: Add sync-wave annotation to each SealedSecret
      ansible.builtin.shell: |
        echo '{{ item }}' \
        | python3 -c "
        import sys, yaml, json
        doc = yaml.safe_load(sys.stdin)
        if doc.get('metadata', {}).get('annotations') is None:
            doc['metadata']['annotations'] = {}
        doc['metadata']['annotations']['argocd.argoproj.io/sync-wave'] = '5'
        print(yaml.dump(doc, default_flow_style=False))
        "
      loop:
        - "{{ sealed_mosquitto_passwords.stdout }}"
        - "{{ sealed_influxdb_auth.stdout }}"
        - "{{ sealed_ha_influxdb.stdout }}"
        - "{{ sealed_nodered_admin.stdout }}"
      register: annotated_secrets
      changed_when: false
      no_log: true

    - name: Write combined SealedSecrets manifest
      ansible.builtin.copy:
        content: |
          # Generated by playbooks/utilities/seal-secrets.yml — DO NOT EDIT by hand.
          # Re-run the playbook to regenerate after changing secrets in group_vars.
          # Encrypted with this cluster's Sealed Secrets controller public key.
          # Namespace-scoped: home-automation. Sync wave 5 (after certs/configmaps).
          ---
          {{ annotated_secrets.results[0].stdout }}
          ---
          {{ annotated_secrets.results[1].stdout }}
          ---
          {{ annotated_secrets.results[2].stdout }}
          ---
          {{ annotated_secrets.results[3].stdout }}
        dest: "{{ work_dir }}/sealed-secrets.yaml"
        mode: "0600"
      changed_when: false
      no_log: true

    - name: Fetch sealed-secrets.yaml to local manifests directory
      ansible.builtin.fetch:
        src: "{{ work_dir }}/sealed-secrets.yaml"
        dest: "{{ playbook_dir }}/../../manifests/home-automation/prereqs/sealed-secrets.yaml"
        flat: true
      no_log: true

    - name: Clean up work directory
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: absent
      changed_when: false

    - name: Next steps
      ansible.builtin.debug:
        msg: |
          sealed-secrets.yaml written to manifests/home-automation/prereqs/sealed-secrets.yaml
          Next steps:
            git add manifests/home-automation/prereqs/sealed-secrets.yaml
            git commit -m "feat: add sealed secrets for home-automation stack"
            git push
          Then register the ArgoCD apps:
            ansible-playbook playbooks/cluster/services-deploy.yml --tags argocd-bootstrap

# ── opnsense-exporter ──────────────────────────────────────────────────────────

- name: Generate Sealed Secret for opnsense-exporter
  hosts: servers[0]
  become: true
  tags: opnsense-exporter
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  vars:
    sealed_secrets_namespace: kube-system
    sealed_secrets_controller_name: sealed-secrets-controller
    work_dir: /tmp/seal-secrets-work

  tasks:
    - name: Ensure work directory exists
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        mode: "0700"
      changed_when: false

    - name: Fetch Sealed Secrets controller public certificate
      ansible.builtin.command: >
        kubeseal --fetch-cert
        --controller-namespace {{ sealed_secrets_namespace }}
        --controller-name {{ sealed_secrets_controller_name }}
      register: controller_cert
      changed_when: false

    - name: Write controller cert to file
      ansible.builtin.copy:
        content: "{{ controller_cert.stdout }}"
        dest: "{{ work_dir }}/sealed-secrets.crt"
        mode: "0644"
      changed_when: false

    - name: Create and seal opnsense-exporter-credentials Secret
      ansible.builtin.shell: |
        kubectl create secret generic opnsense-exporter-credentials \
          --namespace monitoring \
          --from-literal=api-key='{{ opnsense_api_key }}' \
          --from-literal=api-secret='{{ opnsense_api_secret }}' \
          --dry-run=client -o yaml \
        | kubeseal --cert {{ work_dir }}/sealed-secrets.crt \
          --format yaml
      register: sealed_opnsense
      changed_when: false
      no_log: true

    - name: Add sync-wave annotation to SealedSecret
      ansible.builtin.shell: |
        echo '{{ sealed_opnsense.stdout }}' \
        | python3 -c "
        import sys, yaml
        doc = yaml.safe_load(sys.stdin)
        if doc.get('metadata', {}).get('annotations') is None:
            doc['metadata']['annotations'] = {}
        doc['metadata']['annotations']['argocd.argoproj.io/sync-wave'] = '1'
        print(yaml.dump(doc, default_flow_style=False))
        "
      register: annotated_opnsense
      changed_when: false
      no_log: true

    - name: Write SealedSecret manifest to work dir
      ansible.builtin.copy:
        content: |
          # Generated by playbooks/utilities/seal-secrets.yml — DO NOT EDIT by hand.
          # Re-run the playbook to regenerate after changing secrets in group_vars.
          # Encrypted with this cluster's Sealed Secrets controller public key.
          # Namespace-scoped: monitoring. Sync wave 1 (after namespace).
          ---
          {{ annotated_opnsense.stdout }}
        dest: "{{ work_dir }}/opnsense-sealed-secrets.yaml"
        mode: "0600"
      changed_when: false
      no_log: true

    - name: Fetch sealed-secrets.yaml to local manifests directory
      ansible.builtin.fetch:
        src: "{{ work_dir }}/opnsense-sealed-secrets.yaml"
        dest: "{{ playbook_dir }}/../../manifests/monitoring/prereqs/sealed-secrets.yaml"
        flat: true
      no_log: true

    - name: Clean up work directory
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: absent
      changed_when: false

    - name: Next steps
      ansible.builtin.debug:
        msg: |
          sealed-secrets.yaml written to manifests/monitoring/prereqs/sealed-secrets.yaml
          Next steps:
            git add manifests/monitoring/prereqs/sealed-secrets.yaml
            git commit -m "feat(038): add opnsense-exporter SealedSecret"
            git push gitea 038-opnsense-metrics
          Then register the ArgoCD apps:
            ansible-playbook -i hosts.ini playbooks/cluster/services-deploy.yml --tags argocd-bootstrap
