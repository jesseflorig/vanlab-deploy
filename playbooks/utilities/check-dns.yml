---
# playbooks/utilities/check-dns.yml
# Read-only DNS verification — reports resolver state without modifying netplan.
# Previously this playbook wrote 90-ansible-dns.yaml with dhcp4: true, which
# conflicted with the static config in 50-cloud-init.yaml and caused nodes to
# drop their static IPs on reboot. DNS config is now owned by roles/netplan.

- name: Verify DNS resolver state on cluster nodes
  hosts: cluster
  become: true
  gather_facts: true

  tasks:
    - name: Ensure this host is Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "Ubuntu"
        fail_msg: "This playbook is intended for Ubuntu hosts only."

    - name: Read DNS status from resolvectl
      ansible.builtin.command: >
        resolvectl dns {{ ansible_facts['default_ipv4']['interface'] }}
      register: resolvectl_dns
      changed_when: false
      failed_when: false

    - name: Read /etc/resolv.conf
      ansible.builtin.slurp:
        src: /etc/resolv.conf
      register: resolv_conf

    - name: Show DNS verification output
      ansible.builtin.debug:
        msg:
          - "Interface: {{ ansible_facts['default_ipv4']['interface'] }}"
          - "resolvectl: {{ resolvectl_dns.stdout | default('unavailable') }}"
          - "resolv.conf: {{ resolv_conf.content | b64decode }}"
