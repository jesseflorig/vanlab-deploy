---
# network-deploy.yml
# Manages OPNsense router configuration via REST API.
# Runs on localhost; connects to OPNsense at {{ opnsense_firewall }} over HTTPS.
#
# Credentials sourced from group_vars/all.yml (gitignored):
#   opnsense_api_key, opnsense_api_secret, opnsense_firewall, opnsense_api_verify_ssl
#
# Interface map (discovered from API):
#   opt1 = VLAN10_Mgmt  (10.1.10.x) — NVR host, management devices
#   opt2 = VLAN20_Cluster (10.1.20.x) — K3s cluster nodes
#   opt3 = VLAN30_IoT, opt4 = VLAN40_Camera, opt5 = VLAN50_Trusted
#
# Usage:
#   ansible-playbook -i hosts.ini playbooks/network/network-deploy.yml --check
#   ansible-playbook -i hosts.ini playbooks/network/network-deploy.yml
#
# Prerequisites:
#   ansible-galaxy collection install -r requirements.yml
#   OPNsense: os-firewall plugin installed, API user has Firewall: Rules privilege

- name: Configure OPNsense
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    opnsense_api_base: "https://{{ opnsense_firewall }}/api"
    opnsense_auth: "{{ opnsense_api_key }}:{{ opnsense_api_secret }}"
    fleet1_lan_infra_dns_records:
      - hostname: opnsense
        domain: fleet1.lan
        rr: A
        server: 10.1.1.1
        addptr: "0"
        description: "OPNsense router/firewall"
      - hostname: sw-main
        domain: fleet1.lan
        rr: A
        server: 10.1.1.10
        addptr: "0"
        description: "Main management switch"
      - hostname: sw-poe-1
        domain: fleet1.lan
        rr: A
        server: 10.1.1.11
        addptr: "0"
        description: "PoE switch 1"
      - hostname: sw-poe-2
        domain: fleet1.lan
        rr: A
        server: 10.1.1.12
        addptr: "0"
        description: "PoE switch 2"
      - hostname: sw-poe-3
        domain: fleet1.lan
        rr: A
        server: 10.1.1.13
        addptr: "0"
        description: "PoE switch 3"
    fleet1_lan_traefik_dns_records:
      - hostname: argocd
      - hostname: frigate
      - hostname: gitea
      - hostname: grafana
      - hostname: hass
      - hostname: influxdb
      - hostname: mqtt
      - hostname: node-red
      - hostname: prometheus
      - hostname: traefik
    # NVR firewall rules — idempotency key is the description field
    nvr_rules:
      - seq: 200
        action: pass
        interface: opt1   # VLAN10_Mgmt — NVR host is 10.1.10.11
        direction: in
        ipprotocol: inet
        protocol: TCP
        source_net: "10.1.10.11"
        destination_net: "10.1.20.0/24"
        destination_port: "8883"
        description: "NVR Frigate → MQTT broker MQTTS"
      - seq: 201
        action: pass
        interface: opt2   # VLAN20_Cluster — Traefik runs on cluster nodes
        direction: in
        ipprotocol: inet
        protocol: TCP
        source_net: "10.1.20.0/24"
        destination_net: "10.1.10.11"
        destination_port: "5000"
        description: "Traefik → NVR Frigate web UI"
      - seq: 202
        action: pass
        interface: opt1   # VLAN10_Mgmt — NVR host is 10.1.10.11
        direction: in
        ipprotocol: inet
        protocol: TCP
        source_net: "10.1.10.11"
        destination_net: "10.1.20.0/24"
        destination_port: "2049"
        description: "NVR Frigate → Longhorn NFS clips share"
      - seq: 203
        action: pass
        interface: opt1   # VLAN10_Mgmt — NVR host is 10.1.10.11
        direction: in
        ipprotocol: inet
        protocol: TCP
        source_net: "10.1.10.11"
        destination_net: "10.1.40.0/24"
        destination_port: "554"
        description: "NVR Frigate → cameras RTSP"
  module_defaults:
    group/oxlorg.opnsense.all:
      firewall: "{{ opnsense_firewall }}"
      api_key: "{{ opnsense_api_key }}"
      api_secret: "{{ opnsense_api_secret }}"
      ssl_verify: "{{ opnsense_api_verify_ssl }}"
  tasks:
    - name: Verify OPNsense API connectivity
      oxlorg.opnsense.raw:
        module: core
        controller: firmware
        command: info
      register: opnsense_info

    - name: Ensure os-ddclient plugin is installed
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/core/firmware/install/os-ddclient"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
      register: ddclient_install
      # 400 status likely means it's already installed
      failed_when: ddclient_install.status not in [200, 400]

    - name: Display OPNsense system information
      ansible.builtin.debug:
        msg: "Connected to OPNsense — firmware: {{ opnsense_info.data.product_version | default('unknown') }}"

    # ── NVR firewall rules ────────────────────────────────────────────────────
    # Using ansible.builtin.uri directly — the oxlorg.opnsense.rule module has
    # a parsing bug (interface_invert field) that breaks after the first rule is
    # created. Direct API calls are more reliable here.
    - name: Fetch existing firewall rules
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/firewall/filter/get"
        method: GET
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        return_content: true
      register: existing_rules_raw

    - name: Normalize rules response to dict (API returns [] when empty)
      ansible.builtin.set_fact:
        rule_uuid_by_desc: {}
        existing_rules_dict: >-
          {{ existing_rules_raw.json.filter.rules.rule
             if (existing_rules_raw.json.filter.rules.rule | type_debug) == 'dict'
             else {} }}

    - name: Build description→uuid map from existing rules
      ansible.builtin.set_fact:
        rule_uuid_by_desc: "{{ rule_uuid_by_desc | combine({item.value.description: item.key}) }}"
      loop: "{{ existing_rules_dict | dict2items }}"
      loop_control:
        label: "{{ item.value.description | default('(no description)') }}"

    - name: Apply NVR firewall rules
      ansible.builtin.uri:
        url: >-
          {{ opnsense_api_base }}/firewall/filter/{{
            'set_rule/' + rule_uuid_by_desc[item.description]
            if item.description in rule_uuid_by_desc
            else 'add_rule'
          }}
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          rule:
            sequence: "{{ item.seq }}"
            action: "{{ item.action }}"
            interface: "{{ item.interface }}"
            direction: "{{ item.direction }}"
            ipprotocol: "{{ item.ipprotocol }}"
            protocol: "{{ item.protocol }}"
            source_net: "{{ item.source_net }}"
            destination_net: "{{ item.destination_net }}"
            destination_port: "{{ item.destination_port }}"
            description: "{{ item.description }}"
        return_content: true
        status_code: [200]
      register: rule_result
      changed_when: rule_result.json.result in ['saved', 'added']
      loop: "{{ nvr_rules }}"
      loop_control:
        label: "{{ item.description }}"

    - name: Apply firewall filter changes
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/firewall/filter/apply"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
        return_content: true
        status_code: [200]
      register: apply_result
      changed_when: apply_result.json.status | default('') == 'ok'

    # ── fleet1.lan Unbound DNS override ──────────────────────────────────────
    # OPNsense 26.1 Unbound will not start with a wildcard host override and
    # explicit host overrides in the same domain. Keep explicit records instead.
    # Idempotency: search existing overrides by domain+hostname before creating.
    - name: Fetch existing Unbound host overrides
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/searchHostOverride"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          current: 1
          rowCount: 100
          searchPhrase: ""
        return_content: true
        status_code: [200]
      register: existing_unbound_overrides

    - name: Find fleet1.lan wildcard override
      ansible.builtin.set_fact:
        fleet1_lan_wildcard_overrides: >-
          {{ existing_unbound_overrides.json.rows
             | selectattr('hostname', 'equalto', '*')
             | selectattr('domain', 'equalto', 'fleet1.lan')
             | list }}

    - name: Disable incompatible fleet1.lan wildcard host override
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/toggleHostOverride/{{ item.uuid }}/0"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
        return_content: true
        status_code: [200]
      register: unbound_wildcard_disable_results
      loop: "{{ fleet1_lan_wildcard_overrides }}"
      loop_control:
        label: "*.fleet1.lan"
      when: item.enabled | default('0') == '1'
      changed_when: true

    - name: Check if fleet1.lan apex override already exists
      ansible.builtin.set_fact:
        fleet1_lan_apex_exists: >-
          {{ existing_unbound_overrides.json.rows
             | selectattr('hostname', 'equalto', '')
             | selectattr('domain', 'equalto', 'fleet1.lan')
             | list | length > 0 }}

    - name: Create fleet1.lan apex host override
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/addHostOverride"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          host:
            enabled: "1"
            hostname: ""
            domain: "fleet1.lan"
            rr: "A"
            server: "10.1.20.11"
            addptr: "0"
            description: "fleet1.lan apex → Traefik node1"
        return_content: true
        status_code: [200]
      register: unbound_apex_result
      when: not fleet1_lan_apex_exists
      changed_when: unbound_apex_result.json.result | default('') == 'saved'

    - name: Build desired Traefik fleet1.lan records
      ansible.builtin.set_fact:
        fleet1_lan_traefik_dns_records_expanded: >-
          {{ fleet1_lan_traefik_dns_records_expanded | default([]) + [{
            'hostname': item.hostname,
            'domain': 'fleet1.lan',
            'rr': 'A',
            'server': '10.1.20.11',
            'addptr': '0',
            'description': item.hostname ~ '.fleet1.lan -> Traefik node1'
          }] }}
      loop: "{{ fleet1_lan_traefik_dns_records }}"
      loop_control:
        label: "{{ item.hostname }}.fleet1.lan"

    - name: Build existing fleet1.lan Traefik override lookup
      ansible.builtin.set_fact:
        fleet1_lan_traefik_existing_by_hostname: >-
          {{ fleet1_lan_traefik_existing_by_hostname | default({}) | combine({
            item.hostname: existing_unbound_overrides.json.rows
              | selectattr('hostname', 'equalto', item.hostname)
              | selectattr('domain', 'equalto', item.domain)
              | list
          }) }}
      loop: "{{ fleet1_lan_traefik_dns_records_expanded }}"
      loop_control:
        label: "{{ item.hostname }}.{{ item.domain }}"

    - name: Fail on conflicting fleet1.lan Traefik hostnames
      ansible.builtin.fail:
        msg: >-
          Conflicting Unbound host override for {{ item.hostname }}.{{ item.domain }}:
          expected {{ item.server }}, found {{
            fleet1_lan_traefik_existing_by_hostname[item.hostname]
            | map(attribute='server')
            | list
            | join(', ')
          }}.
      loop: "{{ fleet1_lan_traefik_dns_records_expanded }}"
      loop_control:
        label: "{{ item.hostname }}.{{ item.domain }}"
      when: >-
        fleet1_lan_traefik_existing_by_hostname[item.hostname]
        | rejectattr('server', 'equalto', item.server)
        | list
        | length > 0

    - name: Create explicit fleet1.lan Traefik host overrides
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/addHostOverride"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          host:
            enabled: "1"
            hostname: "{{ item.hostname }}"
            domain: "{{ item.domain }}"
            rr: "{{ item.rr }}"
            server: "{{ item.server }}"
            addptr: "{{ item.addptr }}"
            description: "{{ item.description }}"
        return_content: true
        status_code: [200]
      register: unbound_traefik_create_results
      loop: "{{ fleet1_lan_traefik_dns_records_expanded }}"
      loop_control:
        label: "{{ item.hostname }}.{{ item.domain }} -> {{ item.server }}"
      when: >-
        fleet1_lan_traefik_existing_by_hostname[item.hostname]
        | selectattr('server', 'equalto', item.server)
        | selectattr('rr', 'equalto', item.rr)
        | selectattr('enabled', 'equalto', '1')
        | list
        | length == 0
      changed_when: unbound_traefik_create_results.json.result | default('') == 'saved'

    - name: Build existing fleet1.lan infrastructure override lookup
      ansible.builtin.set_fact:
        fleet1_lan_infra_existing_by_hostname: >-
          {{ fleet1_lan_infra_existing_by_hostname | default({}) | combine({
            item.hostname: existing_unbound_overrides.json.rows
              | selectattr('hostname', 'equalto', item.hostname)
              | selectattr('domain', 'equalto', item.domain)
              | list
          }) }}
      loop: "{{ fleet1_lan_infra_dns_records }}"
      loop_control:
        label: "{{ item.hostname }}.{{ item.domain }}"

    - name: Fail on conflicting fleet1.lan infrastructure hostnames
      ansible.builtin.fail:
        msg: >-
          Conflicting Unbound host override for {{ item.hostname }}.{{ item.domain }}:
          expected enabled {{ item.rr }} record for {{ item.server }}, found {{
            fleet1_lan_infra_existing_by_hostname[item.hostname]
            | map(attribute='server')
            | list
            | join(', ')
          }}.
      loop: "{{ fleet1_lan_infra_dns_records }}"
      loop_control:
        label: "{{ item.hostname }}.{{ item.domain }}"
      when: >-
        (
          fleet1_lan_infra_existing_by_hostname[item.hostname]
          | selectattr('server', 'equalto', item.server)
          | selectattr('rr', 'equalto', item.rr)
          | selectattr('enabled', 'equalto', '1')
          | list
          | length
        ) != (
          fleet1_lan_infra_existing_by_hostname[item.hostname]
          | list
          | length
        )

    - name: Fail on conflicting fleet1.lan infrastructure addresses
      ansible.builtin.fail:
        msg: >-
          Conflicting Unbound host override for {{ item.server }}:
          expected {{ item.hostname }}.{{ item.domain }}, found {{
            existing_unbound_overrides.json.rows
            | selectattr('domain', 'equalto', item.domain)
            | selectattr('server', 'equalto', item.server)
            | rejectattr('hostname', 'equalto', item.hostname)
            | map(attribute='hostname')
            | list
            | join(', ')
          }}.{{ item.domain }}.
      loop: "{{ fleet1_lan_infra_dns_records }}"
      loop_control:
        label: "{{ item.server }}"
      when: >-
        existing_unbound_overrides.json.rows
        | selectattr('domain', 'equalto', item.domain)
        | selectattr('server', 'equalto', item.server)
        | rejectattr('hostname', 'equalto', item.hostname)
        | list
        | length > 0

    - name: Create fleet1.lan infrastructure host overrides
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/addHostOverride"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          host:
            enabled: "1"
            hostname: "{{ item.hostname }}"
            domain: "{{ item.domain }}"
            rr: "{{ item.rr }}"
            server: "{{ item.server }}"
            addptr: "{{ item.addptr }}"
            description: "{{ item.description }}"
        return_content: true
        status_code: [200]
      register: unbound_infra_create_results
      loop: "{{ fleet1_lan_infra_dns_records }}"
      loop_control:
        label: "{{ item.hostname }}.{{ item.domain }} -> {{ item.server }}"
      when: >-
        fleet1_lan_infra_existing_by_hostname[item.hostname]
        | selectattr('server', 'equalto', item.server)
        | selectattr('rr', 'equalto', item.rr)
        | selectattr('enabled', 'equalto', '1')
        | list
        | length == 0
      changed_when: unbound_infra_create_results.json.result | default('') == 'saved'

    - name: Apply Unbound configuration
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/service/reconfigure"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
        return_content: true
        status_code: [200]
      register: unbound_apply_result
      when: >-
        unbound_wildcard_disable_results.changed | default(false)
        or not fleet1_lan_apex_exists
        or unbound_traefik_create_results.changed | default(false)
        or unbound_infra_create_results.changed | default(false)
      changed_when: unbound_apply_result.json.status | default('') == 'ok'

    - name: Start Unbound resolver
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/service/start"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
        return_content: true
        status_code: [200]
      register: unbound_start_result
      changed_when: false

    - name: Check Unbound resolver status
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/service/status"
        method: GET
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        return_content: true
        status_code: [200]
      register: unbound_status_result

    - name: Fail when Unbound resolver is not running
      ansible.builtin.fail:
        msg: >-
          OPNsense Unbound service is {{ unbound_status_result.json.status | default('unknown') }}
          after reconfigure/start. Host override records exist, but LAN DNS will not resolve until
          the Unbound service starts successfully.
      when: unbound_status_result.json.status | default('unknown') != 'running'

    - name: Fetch Unbound settings
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/get"
        method: GET
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
      register: unbound_settings

    - name: Configure Unbound to listen on all interfaces (including Wireguard)
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/unbound/settings/set"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          unbound:
            general:
              active_interface: "" # Empty means all
        status_code: [200]
      register: unbound_listen_result
      # Check if any specific interface is selected (1). If everything is 0, it already listens on all.
      when: >
        unbound_settings.json.unbound.general.active_interface.values()
        | selectattr('selected', 'equalto', 1)
        | list
        | length > 0
      changed_when: unbound_listen_result.json.result | default('') == 'saved'

    # --- Destination NAT: fleet1.lan HTTPS → Traefik NodePort ---
    # Requires OPNsense 26.1+; API path is d_nat (not dnat)
    - name: Fetch existing Destination NAT rules
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/firewall/d_nat/searchRule"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
        return_content: true
        status_code: [200]
      register: existing_dnat_rules

    - name: Check if fleet1.lan HTTPS DNAT rule already exists
      ansible.builtin.set_fact:
        fleet1_lan_dnat_exists: >-
          {{ existing_dnat_rules.json.rows
             | selectattr('descr', 'equalto', 'fleet1.lan HTTPS → Traefik NodePort')
             | list | length > 0 }}

    - name: Create fleet1.lan HTTPS → Traefik NodePort DNAT rule
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/firewall/d_nat/addRule"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          rule:
            disabled: "0"
            nordr: "0"
            interface: lan
            ipprotocol: inet
            protocol: tcp
            destination:
              network: ""
              address: "10.1.20.11"
              port: "443"
              not: "0"
            target: "10.1.20.11"
            local-port: "30443"
            descr: "fleet1.lan HTTPS → Traefik NodePort"
            log: "0"
            nosync: "0"
        return_content: true
        status_code: [200]
      register: dnat_create_result
      when: not fleet1_lan_dnat_exists
      changed_when: dnat_create_result.json.result | default('') == 'saved'

    - name: Check if fleet1.lan MQTTS DNAT rule already exists
      ansible.builtin.set_fact:
        fleet1_lan_mqtts_dnat_exists: >-
          {{ existing_dnat_rules.json.rows
             | selectattr('descr', 'equalto', 'fleet1.lan MQTTS → Traefik NodePort')
             | list | length > 0 }}

    - name: Create fleet1.lan MQTTS → Traefik NodePort DNAT rule
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/firewall/d_nat/addRule"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body:
          rule:
            disabled: "0"
            nordr: "0"
            interface: lan
            ipprotocol: inet
            protocol: tcp
            destination:
              network: ""
              address: "10.1.20.11"
              port: "8883"
              not: "0"
            target: "10.1.20.11"
            local-port: "30883"
            descr: "fleet1.lan MQTTS → Traefik NodePort"
            log: "0"
            nosync: "0"
        return_content: true
        status_code: [200]
      register: mqtts_dnat_create_result
      when: not fleet1_lan_mqtts_dnat_exists
      changed_when: mqtts_dnat_create_result.json.result | default('') == 'saved'

    - name: Apply Destination NAT configuration
      ansible.builtin.uri:
        url: "{{ opnsense_api_base }}/firewall/d_nat/apply"
        method: POST
        url_username: "{{ opnsense_api_key }}"
        url_password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_api_verify_ssl }}"
        body_format: json
        body: {}
        return_content: true
        status_code: [200]
      register: dnat_apply_result
      when: not fleet1_lan_dnat_exists or not fleet1_lan_mqtts_dnat_exists
      changed_when: dnat_apply_result.json.status | default('') == 'ok'


