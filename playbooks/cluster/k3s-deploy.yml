---
- name: Prepare all K3s cluster nodes
  hosts: cluster
  become: true
  tasks:
    - name: Disable swap
      command: swapoff -a
      ignore_errors: true

    - name: Comment out swap in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - sudo
          - vim
        state: present
        update_cache: false
        force_apt_get: true
        lock_timeout: 60
      retries: 5
      delay: 10
      register: apt_result
      until: apt_result is succeeded

    - name: Load required kernel modules at boot
      copy:
        dest: /etc/modules-load.d/k3s.conf
        content: |
          br_netfilter
          overlay

    - name: Load kernel modules immediately
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay

    - name: Apply sysctl settings for K3s networking
      copy:
        dest: /etc/sysctl.d/99-k3s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Read existing /boot/firmware/cmdline.txt
      slurp:
        src: /boot/firmware/cmdline.txt
      register: cmdline_raw

    - name: Set updated cmdline with cgroup parameters
      set_fact:
        updated_cmdline: "{{ cmdline_raw['content'] | b64decode | regex_replace('cgroup_\\S+', '') | regex_replace(' +$', '') ~ ' cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1' }}"

    - name: Update /boot/firmware/cmdline.txt with cgroup parameters
      copy:
        content: "{{ updated_cmdline }}"
        dest: /boot/firmware/cmdline.txt
        owner: root
        group: root
        mode: '0644'
      notify: Reboot to apply cgroup changes

  handlers:
    - name: Reboot to apply cgroup changes
      reboot:
        msg: "Rebooting to enable cgroups for Kubernetes"
        pre_reboot_delay: 5
        post_reboot_delay: 10
        reboot_timeout: 300

- name: Install K3s on server nodes
  hosts: servers
  become: true
  tasks:
    - name: Install K3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik --disable local-storage --write-kubeconfig-mode 600 --flannel-iface={{ k3s_flannel_iface }}" sh -
      args:
        creates: /etc/systemd/system/k3s.service

    - name: Restrict kubeconfig permissions
      ansible.builtin.file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0600'

    - name: Wait for K3s API port to be reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 6443
        delay: 5
        timeout: 120

    - name: Wait for K3s API server to pass readiness check
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:6443/readyz"
        validate_certs: false
        status_code: [200, 401]
      register: k3s_api_ready
      until: k3s_api_ready.status in [200, 401]
      retries: 24
      delay: 5

    - name: Wait for K3s token file to exist
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/token
        state: present
        timeout: 30

    - name: Read K3s node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/token
      register: k3s_token_raw

    - name: Set K3s token fact
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_token_raw['content'] | b64decode | regex_replace('\n', '') }}"

- name: Install K3s on agent nodes
  hosts: agents
  become: true
  vars:
    k3s_url: "https://{{ k3s_master_ip }}:6443"
  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Install K3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          K3S_URL={{ k3s_url }} \
          K3S_TOKEN={{ hostvars[groups['servers'][0]]['k3s_node_token'] }} \
          INSTALL_K3S_EXEC="--flannel-iface={{ k3s_flannel_iface }}" sh -
      when: >
        ansible_facts.services['k3s-agent.service'] is not defined
        or ansible_facts.services['k3s-agent.service']['state'] != 'running'

    - name: Wait for agent node to appear Ready
      ansible.builtin.shell: |
        kubectl get node {{ inventory_hostname }} \
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      until: node_ready.stdout == "True"
      retries: 30
      delay: 10
      delegate_to: "{{ groups['servers'][0] }}"
      become: true
      changed_when: false

- name: Display cluster node status
  hosts: "{{ groups['servers'][0] }}"
  become: true
  tasks:
    - name: Get cluster node status
      command: kubectl get nodes -o wide
      register: node_status
      changed_when: false

    - name: Show cluster node status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout_lines }}"
