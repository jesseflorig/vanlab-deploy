---
- name: Install Longhorn node prerequisites
  hosts: cluster
  become: true
  roles:
    - longhorn-prereqs

- name: Install Host Tools
  hosts: servers
  become: true
  roles:
    - helm
    - cert-manager
    - longhorn
    - role: pki
      tags: [pki]
    - role: kube-prometheus-stack
      tags: [monitoring]
    - role: loki
      tags: [loki, monitoring]
    - role: alloy
      tags: [alloy, monitoring]
    - role: traefik
      tags: [traefik]
    - static-site
    - role: gitea
      tags: [gitea]
    - role: argocd
      tags: [argocd]
    - role: sealed-secrets
      tags: [sealed-secrets]
    - role: argocd-bootstrap
      tags: [argocd-bootstrap]
    # ── Home automation stack (Ansible-managed, superseded by ArgoCD) ─────────
    # These roles perform the initial Helm install and prerequisite setup.
    # Once ArgoCD is managing the stack (after running seal-secrets.yml and
    # re-running argocd-bootstrap), these can be removed from this playbook.
    - role: mosquitto
      tags: [home-automation, mosquitto]
    - role: influxdb
      tags: [home-automation, influxdb]
    - role: home-assistant
      tags: [home-automation, hass]
    - role: node-red
      tags: [home-automation, node-red]

- name: Deploy services to agent nodes
  hosts: agents
  become: true
  tasks:
    - name: No agent services defined yet
      ansible.builtin.debug:
        msg: "No agent-specific services configured"
