---
- name: Install Longhorn node prerequisites
  hosts: cluster
  become: true
  roles:
    - longhorn-prereqs

- name: Install Host Tools
  hosts: servers
  become: true
  roles:
    - helm
    - cert-manager
    - longhorn
    - role: kube-prometheus-stack
      tags: [monitoring]
    - traefik
    - static-site
    - role: gitea
      tags: [gitea]
    - role: argocd
      tags: [argocd]
    - role: argocd-bootstrap
      tags: [argocd-bootstrap]

- name: Deploy services to agent nodes
  hosts: agents
  become: true
  tasks:
    - name: No agent services defined yet
      ansible.builtin.debug:
        msg: "No agent-specific services configured"
