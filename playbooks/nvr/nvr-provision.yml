---
# nvr-provision.yml
# Provisions the dedicated NVR host at 10.1.10.11 running Frigate with Hailo-8.
#
# Two-phase execution is required:
#
#   Phase A (before ArgoCD sync — installs host software only):
#     ansible-playbook -i hosts.ini playbooks/nvr/nvr-provision.yml \
#       --tags host-setup,hailo
#
#   Phase B (after ArgoCD syncs manifests/frigate/ and cert-manager issues
#            the frigate-mqtt-client Certificate, and nvr_longhorn_nfs_ip is set):
#     ansible-playbook -i hosts.ini playbooks/nvr/nvr-provision.yml \
#       --tags frigate-config,nfs-mount,frigate-service
#
#   Full idempotent re-run (both phases):
#     ansible-playbook -i hosts.ini playbooks/nvr/nvr-provision.yml
#
# Credentials sourced from group_vars/all.yml (gitignored):
#   nvr_frigate_admin_password, nvr_longhorn_nfs_ip, nvr_longhorn_nfs_path
# MQTT cert material is read from the cluster automatically (no manual PEM paste needed)
#
# See specs/041-nvr-frigate-hailo/quickstart.md for full runbook.

- name: Provision NVR host
  hosts: nvr
  become: true
  gather_facts: true
  roles:
    - role: nvr
