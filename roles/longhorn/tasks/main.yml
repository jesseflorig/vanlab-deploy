---
# Deploy Longhorn distributed block storage on K3s cluster nodes.
# Disables K3s local-storage addon (durably, via config.yaml) before installing
# Longhorn as the default StorageClass with 2-replica volumes.

- name: Disable K3s local-storage addon (prevents local-path from being default)
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      disable:
        - local-storage
    owner: root
    group: root
    mode: "0644"
  notify: Restart K3s server

- name: Flush handlers to restart K3s if config changed
  ansible.builtin.meta: flush_handlers

- name: Wait for local-path StorageClass to be absent
  ansible.builtin.command: >
    kubectl get storageclass local-path
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: local_path_check
  failed_when: false
  changed_when: false
  until: local_path_check.rc != 0
  retries: 12
  delay: 10
  run_once: true

- name: Add Longhorn Helm repo
  ansible.builtin.command: helm repo add longhorn https://charts.longhorn.io
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when:
    - helm_repo_add.rc != 0
    - "'already exists' not in helm_repo_add.stderr | lower"
  run_once: true

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false
  run_once: true

- name: Copy Longhorn Helm values
  ansible.builtin.copy:
    src: values.yaml
    dest: /tmp/longhorn-values.yaml
    mode: "0644"
  run_once: true

- name: Install Longhorn via Helm
  ansible.builtin.command: >
    helm upgrade --install longhorn longhorn/longhorn
    --namespace {{ longhorn_namespace }}
    --create-namespace
    --version {{ longhorn_version }}
    --values /tmp/longhorn-values.yaml
    --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: longhorn_install
  changed_when: "'has been deployed' in longhorn_install.stdout or 'has been upgraded' in longhorn_install.stdout"
  run_once: true

- name: Wait for longhorn-manager DaemonSet rollout
  ansible.builtin.command: >
    kubectl rollout status daemonset/longhorn-manager
    -n {{ longhorn_namespace }}
    --timeout=10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  run_once: true

- name: Wait for longhorn-ui Deployment rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/longhorn-ui
    -n {{ longhorn_namespace }}
    --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  run_once: true

- name: Wait for longhorn-driver-deployer Deployment rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/longhorn-driver-deployer
    -n {{ longhorn_namespace }}
    --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  run_once: true

# CSI components are created by longhorn-driver-deployer after it runs.
# Retry with delay to handle NotFound until resources are created.
- name: Wait for longhorn-csi-plugin DaemonSet rollout
  ansible.builtin.command: >
    kubectl rollout status daemonset/longhorn-csi-plugin
    -n {{ longhorn_namespace }}
    --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: csi_plugin_rollout
  changed_when: false
  until: csi_plugin_rollout.rc == 0
  retries: 12
  delay: 15
  run_once: true

- name: Wait for csi-attacher Deployment rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/csi-attacher
    -n {{ longhorn_namespace }}
    --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: csi_attacher_rollout
  changed_when: false
  until: csi_attacher_rollout.rc == 0
  retries: 12
  delay: 15
  run_once: true

- name: Wait for csi-provisioner Deployment rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/csi-provisioner
    -n {{ longhorn_namespace }}
    --timeout=5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: csi_provisioner_rollout
  changed_when: false
  until: csi_provisioner_rollout.rc == 0
  retries: 12
  delay: 15
  run_once: true

- name: Display Longhorn storage node count
  ansible.builtin.command: >
    kubectl get nodes.longhorn.io
    -n {{ longhorn_namespace }}
    --no-headers
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: longhorn_nodes
  changed_when: false
  run_once: true

- name: Show Longhorn storage nodes
  ansible.builtin.debug:
    msg: "Longhorn storage nodes ({{ longhorn_nodes.stdout_lines | length }}): {{ longhorn_nodes.stdout_lines }}"
  run_once: true
