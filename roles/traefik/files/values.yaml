service:
  type: NodePort

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    nodePort: 30080
  websecure:
    expose:
      default: false

ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesIngress:
    enabled: true

logs:
  access:
    enabled: true
