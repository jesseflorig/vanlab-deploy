- name: Copy whoami manifest to server
  ansible.builtin.copy:
    src: whoami.yaml
    dest: /tmp/whoami.yaml
    mode: '0644'

- name: Apply whoami manifest
  command: kubectl apply -f /tmp/whoami.yaml

- name: Wait for whoami rollout
  command: kubectl rollout status deployment/whoami -n traefik --timeout=60s
  changed_when: false
