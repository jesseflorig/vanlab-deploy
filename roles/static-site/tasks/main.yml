---
- name: Copy static site manifest
  ansible.builtin.copy:
    src: site.yaml
    dest: /tmp/site.yaml
    mode: "0644"

- name: Apply static site manifest
  ansible.builtin.command: kubectl apply -f /tmp/site.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: site_result
  changed_when: "'created' in site_result.stdout or 'configured' in site_result.stdout"

- name: Wait for static site rollout
  ansible.builtin.command: kubectl rollout status deployment/static-site -n traefik --timeout=60s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Copy redirect rules manifest
  ansible.builtin.copy:
    src: redirects.yaml
    dest: /tmp/redirects.yaml
    mode: "0644"

- name: Apply redirect rules manifest
  ansible.builtin.command: kubectl apply -f /tmp/redirects.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: redirects_result
  changed_when: "'created' in redirects_result.stdout or 'configured' in redirects_result.stdout"
