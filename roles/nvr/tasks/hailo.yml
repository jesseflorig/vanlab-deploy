---
# hailo.yml — Install Hailo-8 PCIe driver and runtime from pre-staged .deb packages.
#
# Operator must download packages from hailo.ai/developer-zone and stage them at:
#   roles/nvr/files/hailo/hailort_*_amd64.deb        (HailoRT runtime + CLI)
#   roles/nvr/files/hailo/hailort-dkms_*_all.deb     (PCIe kernel module via DKMS)
#
# Both packages are free to download after registering at hailo.ai.

# ── Cleanup any leftover RPi APT artifacts (idempotent) ──────────────────────

- name: Remove stale Raspberry Pi APT key if present
  ansible.builtin.file:
    path: /etc/apt/keyrings/raspberrypi.gpg.key
    state: absent

# ── DKMS build dependencies ───────────────────────────────────────────────────

- name: Install DKMS and kernel build dependencies
  ansible.builtin.apt:
    name:
      - dkms
      - "linux-headers-{{ ansible_kernel }}"
      - build-essential
    state: present
    update_cache: true

# ── Copy and install Hailo .deb packages ─────────────────────────────────────

- name: Find staged Hailo .deb packages
  ansible.builtin.find:
    paths: "{{ role_path }}/files/hailo"
    patterns: "*.deb"
  register: hailo_debs
  delegate_to: localhost
  become: false
  failed_when: hailo_debs.files | length == 0

- name: Copy Hailo .deb packages to host
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "/tmp/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ hailo_debs.files }}"

- name: Force-install Hailo .deb packages (allows downgrade)
  ansible.builtin.command:
    cmd: "dpkg -i --force-downgrade /tmp/{{ item.path | basename }}"
  loop: "{{ hailo_debs.files }}"
  register: dpkg_result
  changed_when: "'already installed' not in dpkg_result.stdout"
  notify: reload-udev

# ── udev rules ────────────────────────────────────────────────────────────────

- name: Deploy Hailo udev rules
  ansible.builtin.template:
    src: 51-hailo-udev.rules.j2
    dest: /etc/udev/rules.d/51-hailo-udev.rules
    mode: "0644"
    owner: root
    group: root
  notify: reload-udev

- name: Flush handlers to apply udev rules immediately
  ansible.builtin.meta: flush_handlers

# ── Device verification ───────────────────────────────────────────────────────

- name: Verify Hailo-8 device node exists
  ansible.builtin.stat:
    path: /dev/hailo0
  register: hailo_device
  failed_when: not hailo_device.stat.exists
  changed_when: false

- name: Verify Hailo-8 firmware responds
  ansible.builtin.command: hailortcli fw-control identify
  register: hailo_identify
  changed_when: false
  failed_when: hailo_identify.rc != 0

- name: Display Hailo-8 firmware information
  ansible.builtin.debug:
    msg: "Hailo-8 identified: {{ hailo_identify.stdout_lines[0] | default('see full output') }}"
