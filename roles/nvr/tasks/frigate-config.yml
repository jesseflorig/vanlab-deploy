---
# frigate-config.yml — Create config directories, read MQTT certs from cluster,
# deploy certificates, render Frigate config.
#
# Requires ArgoCD to have synced manifests/frigate/ and cert-manager to have
# issued the frigate-mqtt-client Certificate before this task file runs.
# Run as part of Phase B: --tags frigate-config,nfs-mount,frigate-service

# ── Directories ───────────────────────────────────────────────────────────────

- name: Create Frigate config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /var/lib/frigate/config
    - /var/lib/frigate/config/certs
    - /var/lib/frigate/config/model_cache
    - /var/lib/frigate/media

# ── Read MQTT cert material from cluster ──────────────────────────────────────

- name: Wait for frigate-mqtt-client certificate to become Ready
  ansible.builtin.command: >
    kubectl wait certificate/frigate-mqtt-client
    -n frigate
    --for=condition=Ready
    --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  delegate_to: "{{ groups['servers'][0] }}"
  become: true

- name: Read MQTT client certificate from cluster secret
  ansible.builtin.command: >
    kubectl get secret frigate-mqtt-client -n frigate
    -o jsonpath='{.data.tls\.crt}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: mqtt_client_cert_b64
  changed_when: false
  delegate_to: "{{ groups['servers'][0] }}"
  become: true

- name: Read MQTT client key from cluster secret
  ansible.builtin.command: >
    kubectl get secret frigate-mqtt-client -n frigate
    -o jsonpath='{.data.tls\.key}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: mqtt_client_key_b64
  changed_when: false
  no_log: true
  delegate_to: "{{ groups['servers'][0] }}"
  become: true

- name: Read MQTT CA certificate from cluster secret
  ansible.builtin.command: >
    kubectl get secret mosquitto-client-ca -n home-automation
    -o jsonpath='{.data.ca\.crt}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: mqtt_ca_cert_b64
  changed_when: false
  delegate_to: "{{ groups['servers'][0] }}"
  become: true

# ── Deploy certificates to NVR host ──────────────────────────────────────────

- name: Deploy MQTT CA certificate
  ansible.builtin.copy:
    content: "{{ mqtt_ca_cert_b64.stdout | b64decode }}"
    dest: /var/lib/frigate/config/certs/ca.crt
    owner: root
    group: root
    mode: "0644"
  notify: restart-frigate

- name: Deploy MQTT client certificate
  ansible.builtin.copy:
    content: "{{ mqtt_client_cert_b64.stdout | b64decode }}"
    dest: /var/lib/frigate/config/certs/frigate-client.crt
    owner: root
    group: root
    mode: "0644"
  notify: restart-frigate

- name: Deploy MQTT client private key
  ansible.builtin.copy:
    content: "{{ mqtt_client_key_b64.stdout | b64decode }}"
    dest: /var/lib/frigate/config/certs/frigate-client.key
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart-frigate

# ── Frigate config.yml ────────────────────────────────────────────────────────

- name: Render Frigate config.yml
  ansible.builtin.template:
    src: frigate-config.yml.j2
    dest: /var/lib/frigate/config/config.yml
    owner: root
    group: root
    mode: "0644"
  notify: restart-frigate

# ── Home Assistant integration output ─────────────────────────────────────────

- name: Render Home Assistant integration config block
  ansible.builtin.template:
    src: ha-frigate-config.txt.j2
    dest: "{{ playbook_dir }}/../ha-frigate-config.txt"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: Notify operator about HA integration config
  ansible.builtin.debug:
    msg: "HA integration config written to ha-frigate-config.txt — apply to Home Assistant per quickstart.md Step 7"
