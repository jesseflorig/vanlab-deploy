---
# nfs-mount.yml — Configure Longhorn NFS clips mount on the NVR host.
# Requires nvr_longhorn_nfs_ip and nvr_longhorn_nfs_path to be set in group_vars/all.yml.
# Run AFTER ArgoCD has synced manifests/frigate/ and the Longhorn share-manager pod is Running.

- name: Assert Longhorn NFS IP is configured
  ansible.builtin.assert:
    that: nvr_longhorn_nfs_ip | length > 0
    fail_msg: >-
      nvr_longhorn_nfs_ip is not set. ArgoCD must sync manifests/frigate/ and the
      Longhorn share-manager pod must be Running before Phase B can execute.
      See specs/041-nvr-frigate-hailo/quickstart.md Step 4.

- name: Assert Longhorn NFS path is configured
  ansible.builtin.assert:
    that: nvr_longhorn_nfs_path | length > 0
    fail_msg: >-
      nvr_longhorn_nfs_path is not set. Obtain the NFS export path with:
        kubectl get pv $(kubectl get pvc frigate-clips -n frigate \
          -o jsonpath='{.spec.volumeName}') -o jsonpath='{.spec.nfs.path}'
      See specs/041-nvr-frigate-hailo/quickstart.md Step 4.

- name: Install NFS client packages
  ansible.builtin.apt:
    name:
      - nfs-common
    state: present

- name: Create Frigate clips mount point
  ansible.builtin.file:
    path: /mnt/frigate-clips
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Longhorn NFS systemd mount unit
  ansible.builtin.template:
    src: frigate-clips.mount.j2
    # systemd escapes hyphens in path components as \x2d:
    # /mnt/frigate-clips → mnt-frigate\x2dclips.mount
    dest: "/etc/systemd/system/mnt-frigate\\x2dclips.mount"
    # Note: dest uses \\x2d so Ansible writes a literal \x2d to the filesystem
    owner: root
    group: root
    mode: "0644"
  notify: systemd-daemon-reload

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Enable and start Longhorn NFS mount
  ansible.builtin.systemd:
    name: "mnt-frigate\\x2dclips.mount"
    # Ansible passes \\x2d → systemd sees \x2d (correct unit name)
    enabled: true
    state: started

- name: Verify clips mount is active
  ansible.builtin.command: mountpoint -q /mnt/frigate-clips
  register: clips_mount_check
  changed_when: false
  failed_when: clips_mount_check.rc != 0
